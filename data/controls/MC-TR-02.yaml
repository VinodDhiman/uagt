id: MC-TR-02
title: Disclosure of AI-generated and synthetic content
domain: transparency
objective: >
  Ensure that AI-generated or manipulated content (including deepfakes and synthetic
  media) is marked and disclosed so that recipients can recognize it as artificial.
mappings:
  # This control is the canonical example of a gap (FR3 relationship=none): a binding
  # EU obligation with no clean ISO 42001 or NIST AI RMF equivalent.
  - framework: ISO-IEC-42001
    version: "2023"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 42001 is a management-system standard and contains no control specific to
      labelling AI-generated or synthetic content; this obligation has no clean equivalent.
    reviewer: "vinod"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      The NIST AI RMF addresses transparency as an outcome but does not prescribe
      synthetic-content disclosure or marking; no direct subcategory corresponds.
    reviewer: "vinod"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.50"
    label: "Transparency obligations for providers and deployers of certain AI systems"
    relationship: full
    confidence: high
    rationale: >
      Article 50 imposes marking/disclosure duties for synthetic media and certain
      interactions; the obligation remains live for the 2 Aug 2026 application date.
    reviewer: "vinod"
