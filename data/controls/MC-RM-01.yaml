id: MC-RM-01
title: AI risk assessment and treatment
domain: risk-management
objective: >
  Establish a documented, repeatable process to identify, analyze, evaluate, and
  treat risks arising from AI systems across their lifecycle, including risks to
  health, safety, and fundamental rights.
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "8.2"
    label: "AI risk assessment"
    relationship: full
    confidence: high
    rationale: >
      Clause 8.2 requires a defined AI risk assessment process, complemented by 6.1
      (actions to address risks); together these map directly to this control.
    reviewer: "vinod"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MANAGE-1.1"
    label: "AI risks are prioritized, responded to, and managed"
    relationship: partial
    confidence: medium
    rationale: >
      MANAGE covers treatment and MAP covers identification; the assessment activity
      is distributed across functions rather than a single prescribed process, so the
      correspondence to one consolidated control is partial.
    reviewer: "vinod"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.9"
    label: "Risk management system"
    relationship: full
    confidence: high
    rationale: >
      Article 9 mandates a continuous, iterative risk management system for high-risk
      AI systems, closely matching the intent of this control for in-scope systems.
    reviewer: "vinod"
