id: MC-HO-01
title: Human oversight of AI systems
domain: human-oversight
objective: >
  Ensure AI systems can be effectively overseen by people during use, including the
  ability to interpret output, intervene, and stop the system, proportionate to risk.
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.9.2"
    label: "Objectives for responsible use of AI systems"
    relationship: partial
    confidence: medium
    rationale: >
      Annex A.9 addresses responsible use and accountable deployment but does not
      prescribe per-decision human intervention controls, so coverage is partial.
    reviewer: "vinod"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "GOVERN-3.2"
    label: "Policies define human roles, responsibilities, and oversight"
    relationship: partial
    confidence: medium
    rationale: >
      GOVERN-3.2 requires policies for human-AI configurations and oversight roles;
      it sets the governance expectation but not the operational intervention capability.
    reviewer: "vinod"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.14"
    label: "Human oversight"
    relationship: full
    confidence: high
    rationale: >
      Article 14 requires high-risk AI systems to be designed for effective human
      oversight, including intervention and stop capability - a direct match.
    reviewer: "vinod"
